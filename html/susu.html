<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="../image/gmrlogor.png">


  <title>Aneka Susu</title>

  <link rel="stylesheet" href="../css/produk.css">

  <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
    rel="stylesheet">
</head>

<body>

  <header class="produk-header">

    <a href="../index.html" class="back-btn">
      <i class="ri-arrow-left-line"></i>
    </a>

    <h2>Aneka Susu</h2>

    <button class="search-btn">
      <i class="ri-search-line"></i>
    </button>

  </header>

  <section class="banner">

    <h1>🥛 Aneka Susu Berkualitas</h1>

    <p>Pilih susu favorit keluarga Anda</p>

  </section>


<!-- CARD PRODUK -->

  <section class="produk-grid">

    <div class="produk-card">

      <span class="promo">PROMO</span>

      <img src="../html/Aneka susu/Sgm 06 150gram.png" alt="Sgm 06 150gram">

      <h3>SGM 06 150g
      </h3>

      <p class="stok">Stok : 42</p>

      <div class="harga">

        <span class="harga-lama">
          Rp17.000
        </span>

        <span class="harga-baru">
          Rp16.000
        </span>

      </div>

      <button
class="btn-beli"

onclick="addToCart(
'Sgm 06 150gram',
16000,
'../html/Aneka susu/Sgm 06 150gram.png'
)">

Beli

</button>

    </div>

     <div class="produk-card">

      <span class="promo">PROMO</span>

      <img src="../asset/fortigro.jpg" alt="DOWCOW FORTIGROW">

      <h3>DOWCOW FORTIGROW</h3>

      <p class="stok">Stok : 25</p>

      <div class="harga">

        <span class="harga-lama">
          Rp80.000
        </span>

        <span class="harga-baru">
          Rp75.000
        </span>

      </div>

      <button
class="btn-beli"

onclick="addToCart(
'DOWCOW FORTIGROW',
75000,
'../asset/fortigro.jpg'
)">

Beli

</button>

    </div>

  </section>

 


  

<!-- Keranjang Button -->
<button id="cartToggle" class="cart-toggle">

  <i class="ri-shopping-cart-2-line"></i>

  <span id="cartCount">0</span>

</button>

<!-- Keranjang -->
<div class="cart-overlay" id="cartOverlay"></div>

<div class="cart-sheet" id="cartSheet">

  <div class="cart-header">

    <h3>Keranjang Belanja</h3>

    <button id="closeCart">
      <i class="ri-close-line"></i>
    </button>

  </div>

  <div id="cartItems"></div>

  <div class="cart-footer">

    <h4>
      Total :
      <span id="cartTotal">
        Rp0
      </span>
    </h4>

    <button id="checkoutBtn">

Checkout

</button>

  </div>

</div>

<script src="../js/cart.js"></script>
</body>
</html>
